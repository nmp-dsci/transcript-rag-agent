<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" width="960" height="720" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#1a1d2e"/>
    </linearGradient>
    <linearGradient id="lc-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c6b3a"/>
      <stop offset="100%" stop-color="#134d29"/>
    </linearGradient>
    <linearGradient id="lc-teal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b5e7a"/>
      <stop offset="100%" stop-color="#124059"/>
    </linearGradient>
    <linearGradient id="lc-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a2c7a"/>
      <stop offset="100%" stop-color="#33195a"/>
    </linearGradient>
    <linearGradient id="lc-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4a00"/>
      <stop offset="100%" stop-color="#5a3500"/>
    </linearGradient>
    <linearGradient id="lc-slate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a3040"/>
      <stop offset="100%" stop-color="#1e2330"/>
    </linearGradient>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#4a9eff"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3dd68c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#a78bfa"/>
    </marker>
    <marker id="arrow-amber" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#fbbf24"/>
    </marker>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-green">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e2e8f0" font-size="20" font-weight="700" letter-spacing="0.5">LangChain RAG Pipeline</text>
  <text x="480" y="56" text-anchor="middle" fill="#64748b" font-size="12">yt-agent · langchain 1.3.0 · langchain-openai · langchain-huggingface · ChromaDB</text>

  <!-- ─────────────── LANE LABELS ─────────────── -->
  <!-- Ingestion lane -->
  <rect x="14" y="72" width="930" height="190" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#2a3547" stroke-width="1"/>
  <text x="26" y="93" fill="#3dd68c" font-size="11" font-weight="600" letter-spacing="1">INGESTION</text>

  <!-- Query lane -->
  <rect x="14" y="274" width="930" height="190" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#2a3547" stroke-width="1"/>
  <text x="26" y="295" fill="#4a9eff" font-size="11" font-weight="600" letter-spacing="1">QUERY</text>

  <!-- Recursive lane -->
  <rect x="14" y="476" width="930" height="130" rx="10" fill="#ffffff" fill-opacity="0.02" stroke="#2a3547" stroke-width="1"/>
  <text x="26" y="497" fill="#a78bfa" font-size="11" font-weight="600" letter-spacing="1">RECURSIVE EXPANSION  (optional)</text>

  <!-- ─────────────── INGESTION PATH ─────────────── -->

  <!-- YouTube URL -->
  <rect x="40" y="102" width="130" height="60" rx="8" fill="url(#lc-slate)" stroke="#ef4444" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="128" text-anchor="middle" fill="#ef4444" font-size="11" font-weight="700">YouTube URL</text>
  <text x="105" y="146" text-anchor="middle" fill="#94a3b8" font-size="10">video ID</text>

  <!-- Arrow -->
  <line x1="170" y1="132" x2="205" y2="132" stroke="#3dd68c" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Superdata Fetcher -->
  <rect x="206" y="102" width="138" height="60" rx="8" fill="url(#lc-teal)" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="275" y="125" text-anchor="middle" fill="#38bdf8" font-size="10.5" font-weight="700">SuperdataFetcher</text>
  <text x="275" y="141" text-anchor="middle" fill="#7dd3fc" font-size="9">transcripts/fetcher.py</text>
  <text x="275" y="155" text-anchor="middle" fill="#94a3b8" font-size="9">raw segments</text>

  <!-- Arrow -->
  <line x1="344" y1="132" x2="379" y2="132" stroke="#3dd68c" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- RawTranscriptStore -->
  <rect x="380" y="102" width="148" height="60" rx="8" fill="url(#lc-slate)" stroke="#3dd68c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="454" y="125" text-anchor="middle" fill="#3dd68c" font-size="10.5" font-weight="700">RawTranscriptStore</text>
  <text x="454" y="141" text-anchor="middle" fill="#86efac" font-size="9">rag/storage.py</text>
  <text x="454" y="155" text-anchor="middle" fill="#94a3b8" font-size="9">ChromaDB collection</text>

  <!-- Arrow -->
  <line x1="528" y1="132" x2="563" y2="132" stroke="#3dd68c" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Chunker -->
  <rect x="564" y="102" width="138" height="60" rx="8" fill="url(#lc-green)" stroke="#3dd68c" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="633" y="124" text-anchor="middle" fill="#86efac" font-size="10.5" font-weight="700">build_chunks()</text>
  <text x="633" y="140" text-anchor="middle" fill="#4ade80" font-size="9">rag/chunking.py</text>
  <text x="633" y="155" text-anchor="middle" fill="#94a3b8" font-size="9">1200 chars · 150 overlap</text>

  <!-- Arrow -->
  <line x1="702" y1="132" x2="737" y2="132" stroke="#3dd68c" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- HuggingFaceEmbeddings -->
  <rect x="738" y="102" width="155" height="60" rx="8" fill="url(#lc-amber)" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="815" y="123" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="700">HuggingFaceEmbeddings</text>
  <text x="815" y="138" text-anchor="middle" fill="#fde68a" font-size="9">langchain_huggingface</text>
  <text x="815" y="153" text-anchor="middle" fill="#94a3b8" font-size="9">embed_documents()</text>

  <!-- Arrow down to ChunkStore -->
  <line x1="815" y1="162" x2="815" y2="206" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
  <line x1="815" y1="206" x2="737" y2="230" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-amber)" stroke-dasharray="4,3"/>

  <!-- TranscriptChunkStore -->
  <rect x="564" y="206" width="170" height="52" rx="8" fill="url(#lc-slate)" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="649" y="228" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="700">TranscriptChunkStore</text>
  <text x="649" y="243" text-anchor="middle" fill="#fde68a" font-size="9">rag/storage.py · ChromaDB</text>
  <text x="649" y="255" text-anchor="middle" fill="#94a3b8" font-size="9">vectors + metadata</text>

  <!-- ─────────────── QUERY PATH ─────────────── -->

  <!-- Question input -->
  <rect x="40" y="302" width="130" height="60" rx="8" fill="url(#lc-slate)" stroke="#4a9eff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="105" y="325" text-anchor="middle" fill="#4a9eff" font-size="11" font-weight="700">Question</text>
  <text x="105" y="341" text-anchor="middle" fill="#94a3b8" font-size="10">RagQuestionRequest</text>
  <text x="105" y="355" text-anchor="middle" fill="#94a3b8" font-size="9">agents/models.py</text>

  <!-- Arrow -->
  <line x1="170" y1="332" x2="205" y2="332" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Embed query -->
  <rect x="206" y="302" width="138" height="60" rx="8" fill="url(#lc-amber)" stroke="#fbbf24" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="275" y="324" text-anchor="middle" fill="#fbbf24" font-size="10.5" font-weight="700">embed_query()</text>
  <text x="275" y="340" text-anchor="middle" fill="#fde68a" font-size="9">langchain_huggingface</text>
  <text x="275" y="354" text-anchor="middle" fill="#94a3b8" font-size="9">HuggingFaceEmbeddings</text>

  <!-- Arrow -->
  <line x1="344" y1="332" x2="379" y2="332" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MultiTranscriptRagContextProvider -->
  <rect x="380" y="302" width="178" height="60" rx="8" fill="url(#lc-teal)" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="469" y="323" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">MultiTranscriptRag</text>
  <text x="469" y="337" text-anchor="middle" fill="#38bdf8" font-size="10" font-weight="700">ContextProvider</text>
  <text x="469" y="352" text-anchor="middle" fill="#7dd3fc" font-size="9">rag/context.py</text>
  <text x="469" y="364" text-anchor="middle" fill="#94a3b8" font-size="9">cosine similarity · top-k</text>

  <!-- Dotted line from ChunkStore to ContextProvider -->
  <line x1="649" y1="258" x2="649" y2="280" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="649" y1="280" x2="559" y2="322" stroke="#fbbf24" stroke-width="1" stroke-dasharray="3,3" marker-end="url(#arrow-amber)"/>

  <!-- Arrow -->
  <line x1="558" y1="332" x2="593" y2="332" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Context Assembly -->
  <rect x="594" y="302" width="148" height="60" rx="8" fill="url(#lc-slate)" stroke="#4a9eff" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="668" y="325" text-anchor="middle" fill="#4a9eff" font-size="10.5" font-weight="700">Context Assembly</text>
  <text x="668" y="341" text-anchor="middle" fill="#93c5fd" font-size="9">agents/context.py</text>
  <text x="668" y="355" text-anchor="middle" fill="#94a3b8" font-size="9">TranscriptContext</text>

  <!-- Arrow -->
  <line x1="742" y1="332" x2="777" y2="332" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ChatOpenAI / LLM -->
  <rect x="778" y="302" width="148" height="60" rx="8" fill="url(#lc-purple)" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="852" y="324" text-anchor="middle" fill="#a78bfa" font-size="10.5" font-weight="700">ChatOpenAI</text>
  <text x="852" y="340" text-anchor="middle" fill="#c4b5fd" font-size="9">langchain_openai</text>
  <text x="852" y="355" text-anchor="middle" fill="#94a3b8" font-size="9">DeepSeek endpoint</text>

  <!-- Prompts note -->
  <rect x="778" y="372" width="148" height="42" rx="6" fill="none" stroke="#4a4060" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="852" y="390" text-anchor="middle" fill="#7c6fad" font-size="9.5" font-weight="600">SystemMessage</text>
  <text x="852" y="404" text-anchor="middle" fill="#7c6fad" font-size="9">HumanMessage  (langchain_core)</text>

  <!-- Arrow down from ChatOpenAI to answer -->
  <line x1="852" y1="362" x2="852" y2="372" stroke="#a78bfa" stroke-width="1.5"/>

  <!-- ─────────────── RECURSIVE LANE ─────────────── -->

  <!-- Subtopic fan-out -->
  <rect x="40" y="502" width="148" height="56" rx="8" fill="url(#lc-purple)" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="114" y="522" text-anchor="middle" fill="#c4b5fd" font-size="10.5" font-weight="700">Subtopic Fan-out</text>
  <text x="114" y="538" text-anchor="middle" fill="#94a3b8" font-size="9">FollowupSubtopic</text>
  <text x="114" y="551" text-anchor="middle" fill="#94a3b8" font-size="9">confidence ranked</text>

  <!-- Arrow -->
  <line x1="188" y1="530" x2="223" y2="530" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Levenshtein dedup -->
  <rect x="224" y="502" width="148" height="56" rx="8" fill="url(#lc-slate)" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="298" y="522" text-anchor="middle" fill="#c4b5fd" font-size="10.5" font-weight="700">Dedup Filter</text>
  <text x="298" y="537" text-anchor="middle" fill="#94a3b8" font-size="9">Levenshtein ≤ 1</text>
  <text x="298" y="551" text-anchor="middle" fill="#94a3b8" font-size="9">novelty_min_chunks</text>

  <!-- Arrow -->
  <line x1="372" y1="530" x2="407" y2="530" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Followup retrieval -->
  <rect x="408" y="502" width="148" height="56" rx="8" fill="url(#lc-teal)" stroke="#38bdf8" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="482" y="522" text-anchor="middle" fill="#38bdf8" font-size="10.5" font-weight="700">Followup Retrieval</text>
  <text x="482" y="537" text-anchor="middle" fill="#7dd3fc" font-size="9">same embed + search</text>
  <text x="482" y="551" text-anchor="middle" fill="#94a3b8" font-size="9">novel chunks only</text>

  <!-- Arrow -->
  <line x1="556" y1="530" x2="591" y2="530" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Final Synthesis LLM -->
  <rect x="592" y="502" width="148" height="56" rx="8" fill="url(#lc-purple)" stroke="#a78bfa" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="666" y="522" text-anchor="middle" fill="#c4b5fd" font-size="10.5" font-weight="700">Synthesis LLM</text>
  <text x="666" y="537" text-anchor="middle" fill="#94a3b8" font-size="9">_invoke_final_synthesis</text>
  <text x="666" y="551" text-anchor="middle" fill="#94a3b8" font-size="9">ChatOpenAI · layered MD</text>

  <!-- Arrow -->
  <line x1="740" y1="530" x2="775" y2="530" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Answer out -->
  <rect x="776" y="502" width="148" height="56" rx="8" fill="url(#lc-green)" stroke="#3dd68c" stroke-width="2" filter="url(#shadow)"/>
  <text x="850" y="522" text-anchor="middle" fill="#86efac" font-size="10.5" font-weight="700">RagTranscriptAnswer</text>
  <text x="850" y="537" text-anchor="middle" fill="#4ade80" font-size="9">answer + references</text>
  <text x="850" y="551" text-anchor="middle" fill="#94a3b8" font-size="9">RecursionTrace</text>

  <!-- Connect first-pass LLM down to recursive subtopic -->
  <line x1="852" y1="414" x2="852" y2="470" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="852" y1="470" x2="114" y2="470" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5,4"/>
  <line x1="114" y1="470" x2="114" y2="502" stroke="#a78bfa" stroke-width="1.2" stroke-dasharray="5,4" marker-end="url(#arrow-purple)"/>
  <text x="480" y="464" text-anchor="middle" fill="#7c6fad" font-size="9">followups_requested=true → recursive path</text>

  <!-- Single-hop answer label -->
  <text x="852" y="455" text-anchor="middle" fill="#64748b" font-size="9">single-hop → returns here directly</text>
  <line x1="852" y1="362" x2="852" y2="444" stroke="#3dd68c" stroke-width="1.2" stroke-dasharray="3,3"/>
  <rect x="796" y="444" width="112" height="20" rx="4" fill="none" stroke="#3dd68c" stroke-width="1"/>
  <text x="852" y="458" text-anchor="middle" fill="#3dd68c" font-size="9" font-weight="600">RagTranscriptAnswer</text>

  <!-- ─────────────── LEGEND ─────────────── -->
  <rect x="40" y="648" width="880" height="58" rx="8" fill="#ffffff" fill-opacity="0.03" stroke="#2a3547" stroke-width="1"/>
  <text x="60" y="667" fill="#64748b" font-size="10" font-weight="600">LEGEND</text>

  <!-- LangChain -->
  <rect x="120" y="655" width="10" height="10" rx="2" fill="#fbbf24"/>
  <text x="136" y="665" fill="#94a3b8" font-size="10">langchain_huggingface / HuggingFaceEmbeddings</text>

  <rect x="370" y="655" width="10" height="10" rx="2" fill="#a78bfa"/>
  <text x="386" y="665" fill="#94a3b8" font-size="10">langchain_openai / ChatOpenAI</text>

  <rect x="560" y="655" width="10" height="10" rx="2" fill="#38bdf8"/>
  <text x="576" y="665" fill="#94a3b8" font-size="10">langchain_core messages</text>

  <rect x="730" y="655" width="10" height="10" rx="2" fill="#3dd68c"/>
  <text x="746" y="665" fill="#94a3b8" font-size="10">ChromaDB storage</text>

  <!-- Row 2 -->
  <line x1="120" y1="682" x2="140" y2="682" stroke="#4a9eff" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="146" y="686" fill="#94a3b8" font-size="10">query flow</text>
  <line x1="240" y1="682" x2="260" y2="682" stroke="#3dd68c" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="266" y="686" fill="#94a3b8" font-size="10">ingestion flow</text>
  <line x1="370" y1="682" x2="390" y2="682" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arrow-purple)" stroke-dasharray="5,3"/>
  <text x="396" y="686" fill="#94a3b8" font-size="10">recursive expansion</text>
  <line x1="530" y1="682" x2="550" y2="682" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="556" y="686" fill="#94a3b8" font-size="10">embeddings feed</text>
</svg>
