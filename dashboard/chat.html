arket suffers from extreme supply swings – vacancy rates can swing from 0.5% to 9% – and off-the-plan purchases carry significant valuation risk, with buyers potentially being 20% down at settlement [2][4]. These factors contribute to the risk of a collapse.", "references": [{"label": "[1]", "source_url": "https://www.youtube.com/watch?v=Bw58mV015z4", "timestamp_url": "https://www.youtube.com/watch?v=Bw58mV015z4&t=0s", "start_seconds": 0.0, "end_seconds": 59.0, "chunk_index": 0, "video_id": "Bw58mV015z4"}, {"label": "[2]", "source_url": "https://www.youtube.com/watch?v=Bw58mV015z4", "timestamp_url": "https://www.youtube.com/watch?v=Bw58mV015z4&t=51s", "start_seconds": 51.0, "end_seconds": 116.0, "chunk_index": 1, "video_id": "Bw58mV015z4"}, {"label": "[4]", "source_url": "https://www.youtube.com/watch?v=Bw58mV015z4", "timestamp_url": "https://www.youtube.com/watch?v=Bw58mV015z4&t=108s", "start_seconds": 108.0, "end_seconds": 161.0, "chunk_index": 3, "video_id": "Bw58mV015z4"}], "token_estimate": 3202, "chunk_count": 10, "llm_calls": 1, "iterations": null, "terminated_reason": null, "elapsed_seconds": 18.44, "error": null}, {"key": "rag_llm_recursive", "title": "rag_llm (recursive)", "command": "uv run python -m src.cli rag-ask \"$question\" --rag_llm --recursive", "answer": "{\n  \"question\": \"Is the Gold Coast property market at risk of collapse, and why?\",\n  \"answer\": \"Yes, the Gold Coast property market is at risk of collapse due to its historical volatility as a boom-and-bust market [1], driven by lifestyle factors and COVID migration that has since reversed [1]. Speakers express concern that the market 'could get smashed harder than any' [2], citing extreme supply swings from 0.5% to 9% vacancy [2], and risks associated with off-the-plan purchases where buyers face valuation risk and potential deposit loss [4]. Additionally, the presence of spruikers and marketing hype reminiscent of the pre-GFC period [1,2] suggests a potential correction.\",\n  \"references\": [\n    {\n      \"label\": \"[1]\",\n      \"source_url\": \"https://www.youtube.com/watch?v=Bw58mV015z4\",\n      \"timestamp_url\": \"https://www.youtube.com/watch?v=Bw58mV015z4&t=0s\",\n      \"start_seconds\": 0.0,\n      \"end_seconds\": 59.0,\n      \"chunk_index\": 1,\n      \"video_id\": \"Bw58mV015z4\"\n    },\n    {\n      \"label\": \"[2]\",\n      \"source_url\": \"https://www.youtube.com/watch?v=Bw58mV015z4\",\n      \"timestamp_url\": \"https://www.youtube.com/watch?v=Bw58mV015z4&t=51s\",\n      \"start_seconds\": 51.0,\n      \"end_seconds\": 116.0,\n      \"chunk_index\": 2,\n      \"video_id\": \"Bw58mV015z4\"\n    },\n    {\n      \"label\": \"[4]\",\n      \"source_url\": \"https://www.youtube.com/watch?v=Bw58mV015z4\",\n      \"timestamp_url\": \"https://www.youtube.com/watch?v=Bw58mV015z4&t=108s\",\n      \"start_seconds\": 108.0,\n      \"end_seconds\": 161.0,\n      \"chunk_index\": 4,\n      \"video_id\": \"Bw58mV015z4\"\n    }\n  ],\n  \"answer_confidence\": 0.9,\n  \"followups_requested\": true,\n  \"subtopics\": [\n    {\n      \"topic\": \"Gold Coast off-the-plan valuation risks\",\n      \"rationale\": \"Chunks mention valuation risk and deposit loss for off-the-plan purchases but do not explain the mechanisms, historical examples, or frequency of such losses on the Gold Coast.\",\n      \"followup_query\": \"What are the specific valuation risks and historical instances of deposit loss for off-the-plan apartments on the Gold Coast during downturns?\",\n      \"confidence\": 0.8\n    },\n    {\n      \"topic\": \"Impact of interest rate changes on Gold Coast demand\",\n      \"rationale\": \"No retrieved chunk discusses how rising interest rates affect borrowing capacity or demand in the Gold Coast market, yet this is a key macro factor for property.\"\n    },\n    {\n      \"topic\": \"https://www.youtube.com/watch?v=...\",\n      \"rationale\": \" \",\n      \"followup_query\": \" \",\n      \"confidence\": 0.0\n    }\n  ]\n}" -Bust Volatility and Extreme Vacancy Swings\nThe Gold Coast property market has \"always been a pretty volatile boom and bust market\" driven by its lifestyle and holiday destination status [1]. On-the-ground commentators describe a \"yo-yo of supply\" that is \"brutal,\" where vacancy rates can swing from as low as 0.5% to as high as 9% through a cycle, often within just five years [1][4]. One panelist noted this is \"insane\" — a complete flip from virtually zero vacancy to massive oversupply [4]. This structural volatility means the Gold Coast is uniquely vulnerable to severe downturns when demand shifts. The same dynamics have previously been observed in inner-city Brisbane suburbs like Hamilton, which swung to 9.5% vacancy, with developers forced to lease units in tranches because they could not sell them [2].\n\n## Finding 2: COVID Migration Reversal Deflating Demand\nThe COVID-era narrative of city-dwellers permanently relocating to the Gold Coast for a lifestyle change is not materialising. Transcript data shows that \"the data shows with migration data, that everyone's moving home\" — those who left Melbourne because COVID was brutal still have family and obligations there, and after 12–18 months on the Gold Coast they are going back [1]. This reversal of the temporary migration surge removes a key demand driver that pushed prices higher during the pandemic, and as these buyers exit or fail to renew demand, the market is left exposed.\n\n## Finding 3: Extreme Off-the-Plan Risks Echo Pre-GFC Conditions\nThe Gold Coast off-the-plan market is drawing direct comparisons to the mid-2000s lead-up to the Global Financial Crisis, when \"all the penthouses and all the marketing and all the spruikers\" emerged from the Gold Coast [1]. Off-the-plan buyers are committing to purchases three years in the future, and the risk is that \"you can be 20% down the day that you've got to settle that thing,\" facing valuation risk, deposit loss, and everything else that comes with it [2][5]. When buyers cannot settle, properties are \"fire sold on completion\" or become bank repossessions sold at debt level, and \"that's actually where the new vals are setting\" — pulling down the entire market [5]. The advice from one expert is to buy acute resales (existing completed units) instead, because at least you \"know what the market's doing at the time you're buying it\" [9].\n\n## Finding 4: Spruiking Activity Signals Peak Froth\nMultiple panelists express concern about the surge in marketing and \"spruiking\" on the Gold Coast. One states, \"a lot of the buyers agent institutes are all coming out of the Gold Coast spruiking up prices. I'm concerned. I think that market could get smashed harder than any\" [4]. The sentiment is echoed by another on-the-ground commentator who \"couldn't agree more,\" pointing out that Gold Coast has always been a supply-hungry market prone to these cycles [4]. The presence of aggressive marketing, spruiker activity, and incentives is treated as a classic hallmark of a market approaching a peak, similar to the pre-GFC period [1][4].\n\n## Finding 5: Broader Australian Property Reset Context\nWhile the Gold Coast has specific vulnerabilities, it sits within a broader discussion of a potential \"property reset in Australia\" [6]. Markets that have seen long runs of growth and rely on heavily negatively geared assets could \"tank and take a serious hit\" or \"flatline for a decade,\" as Sydney did from 2003–2013 (negative 1% growth over 10 years) and Brisbane, Perth, and Adelaide did from 2007–2020 [8]. The panellists note that investor sentiment can shift sharply — if 10–20% of existing investors decide to sell to \"hedge their risk,\" combined with another 10–20% who can no longer borrow, demand can evaporate quickly [8]. The Gold Coast, as a market already described as a \"salesman's dream\" with extreme volatility, would be a prime candidate for such a correction [1][4].\n\n{\"question\": \"Is the Gold Coast pro -17T10:19:31.543426+00:00", "answers": [{"key": "rag_agent", "title": "rag_agent (agentic)", "command": "uv run python -m src.cli rag-ask \"$question\" --rag_agent --url \"https://www.youtube.com/watch?v=gXf7fRvuaXA&pp=ugUHEgVlbi1BVQ%3D%3D\"", "answer": "Now I have comprehensive evidence. Let me compile the final answer.\n\n```json\n{\n  \"question\": \"what is now the best property strategy for investors post budget\",\n  \"answer\": \"## Key Findings\\n\\n1. Hold onto pre-budget (grandfathered) properties and do not sell them — they retain valuable negative gearing benefits that are no longer available for new purchases of existing properties after July 2027 [1][2][3].\\n2. For any new properties bought post-budget, redirect capital toward aggressively paying down that debt, since negative gearing can no longer be claimed against personal income (only quarantined as a deferred tax asset) [2][7].\\n3. New builds retain full negative gearing and CGT benefits post-2027 but carry serious exit risk — when the next buyer does not receive the same incentives, the buyer pool shrinks [8][10].\\n4. Self-managed super funds (SMSFs) are experiencing a surge in interest as a tax-sheltered vehicle to buy property for capital growth with low effective tax rates (~10%) on gains [5][6].\\n5. Commercial property is untouched by the negative gearing changes and is seeing increased investor inquiries, though it carries higher tenant vacancy risk [3][7][10].\\n6. Borrowing capacity has dropped roughly 30% for many investors due to the removal of negative gearing add-backs, pushing demand down into the sub-$750k price bracket and increasing competition with first-home buyers [2][4][5].\\n7. Population growth of 2.4 million expected migrants between 2022–2030 and chronic housing undersupply mean any budget-driven sentiment dip is likely short-term, creating a potential 6-month buying window for calculated investors [1][2][8][9].\\n\\n## Finding 1: Hold Grandfathered Properties, Do Not Sell\\n\\nThe single clearest strategy to emerge from the budget is to keep every property acquired before budget night (12 May, 7:30 p.m.) because those assets retain their negative gearing benefits indefinitely [1][6]. One speaker directly states, \\\"you'd be really stupid to sell your grandfather properties\\\" and that investors are now \\\"incentivized not to sell\\\" because the reintroduction of CGT indexation means holding longer can reduce tax on the real gain [3][5][10]. Selling a grandfathered property forfeits both the ongoing negative gearing offset against personal income and the ability to benefit from indexation of the cost base over time [5][8].\\n\\n## Finding 2: Pay Down Debt on New Assets, Don't Rely on Negative Gearing\\n\\nFor any properties purchased after budget night, negative gearing losses can no longer be claimed as an immediate refund against personal income — they are instead quarantined within the tax return as a \\\"deferred tax asset\\\" that can only be used when the property generates positive income or is sold [7][9]. The recommended strategy is therefore to \\\"redirect as much of our hard savings or our capital into paying down those debts first\\\" — focus on reducing the principal on new assets where the interest cost provides no current tax benefit [2][7]. This is a fundamental shift from the old model of maxing out debt for tax refunds to a model focused on debt reduction for newly acquired assets [2].\\n\\n## Finding 3: New Builds — Tax Benefits Come with Exit Risk\\n\\nThe government explicitly incentivised new builds: negative gearing will only apply to new properties after 1 July 2027, and new builds retain the 50% CGT discount rather than the indexation method [1][4]. However, the panel strongly warns that buying new-build estates carries a major exit risk — when it comes time to sell, the next buyer may not receive the same tax incentives, reducing the buyer pool [8][10]. The advice is to be extremely wary of marketing campaigns pushing land packages, and instead buy with the exit in mind: \\\"you always buy something with an exit in mind\\\" [2][8][10]. Established areas with strong owner-occupier demand are seen as safer because the principal place of residence exemptions remain untouched [8][10].\\n\\n## Finding 4: SMSF / Super — A Surging Alternative Structure\\n\\nA \\\"substantial shift\\\" is underway with sophisticated investors flocking to self-managed super funds (SMSFs) for property investment [2][6]. The accountant reports establishing more SMSFs in recent weeks than ever before [2]. The strategy inside super is to buy for growth and leverage (not cash flow), hold for a period, sell, pay an effective tax rate of roughly 10% (15% super tax on two-thirds of the gain after the 1/3 tax-free component for funds in pension phase), and then reinvest into the next property [5][6]. The panel notes that for SMSFs with balances above $200k–$250k, the structure becomes cost-effective, especially with some lenders now offering 90% LVR loans [3][5].\\n\\n## Finding 5: Commercial Property as a Portfolio Balancer\\n\\nCommercial property has been left untouched by the negative gearing changes — investors can still claim negative gearing on commercial assets [3][7][10]. The budget has triggered \\\"an uptick in commercial inquiries\\\" as investors seek high-yielding assets to offset reduced tax benefits elsewhere in their portfolio [3][7]. However, the panel strongly cautions that commercial investing carries higher risk: tenant vacancies, business risk (especially if buying for your own business), and the need to thoroughly vet leases and contracts [3][7]. It is not a strategy for beginners — investors should get professional advice and ensure they have a \\\"really good foundation for your portfolio\\\" before moving into commercial [7].\\n\\n## Finding 6: Borrowing Capacity Squeeze and the Sub-$750k Opportunity\\n\\nThe removal of negative gearing add-backs from bank serviceability calculations has caused a roughly 30% drop in borrowing capacity for many investors [4][5]. Real examples cited include budgets falling from $1.4M to $1M and $1M to $700k [4]. This is concentrating demand in the sub-$750k range, particularly in established areas with high owner-occupier ratios, where investors now directly compete with first-home buyers [4][5]. At the same time, higher-end markets like Sydney's Eastern Suburbs and North Shore have seen sentiment-driven price drops, while more affordable areas like Campbelltown and Penrith have seen price increases as the buyer pool shifts downward [5].\\n\\n## Finding 7: Fundamentals Are Unchanged — The Buying Window\\n\\nDespite the tax changes, the panel emphasises that the core fundamentals have not changed: Australia's population is growing by roughly 2.4 million people between 2022 and 2030, housing supply is severely lagging, and \\\"the only one way to collapse the property market here in this country is to absolutely cut migration to nil\\\" [1][6][8]. Consumer sentiment is currently \\\"on par with the GFC\\\" — in the low 80s / high 70s — which historically signals a buying opportunity [2][9]. The panel notes that these sentiment dips are short-lived: \\\"the most successful investors wait for periods of time like this… they don't last for long\\\" [2][9]. The strategy is to be calculative and deliberate, use a buyer's agent or property professional, and recognise that this post-budget period is likely a 6-month window before the market rebounds sharply — described as a \\\"Coke bottle curve\\\" that \\\"shakes and shakes and when it pops, it just explodes\\\" [2][8][9].\",\n  \"references\": [\n    {\n      \"label\": \"[1]\",\n      \"source_url\": \"https://www.youtube.com/watch?v=gXf7fRvuaXA\",\n      \"timestamp_url\": \"https://www.youtube.com/watch?v=gXf7fRvuaXA&pp=ugUHEgVlbi1BVQ%3D%3D&t=278s\",\n      \"start_seconds\": 278.0,\n      \"end_seconds\": 340.0,\n      \"chunk_index\": 0,\n      \"vid estamp_url": "https://www.youtube.com/watch?v=gXf7fRvuaXA&pp=ugUHEgVlbi1BVQ%3D%3D&t=1434s", "start_seconds": 1434.0, "end_seconds": 1501.24, "chunk_index": 26, "video_id": "gXf7fRvuaXA"}], "token_estimate": 25998, "chunk_count": 37, "llm_calls": null, "iterations": 8, "terminated_reason": "completed", "elapsed_seconds": 52.72, "error": null}]}, {"id": "q-20260621-052042-f258", "question": "Describe the Agenticy Engineering Workflow every step what it leverages, I want to be able to take the output of this and recreate it in my setup / terminal so output that could enter .md file would be greate", "url": "https://www.youtube.com/watch?v=iQyg-KypKAA", "asked_at": "2026-06-21T05:20:42.256712+00:00", "answers": [{"key": "rag_agent", "title": "rag_agent (agentic)", "command": "uv run python -m src.cli rag-ask \"$question\" --rag_agent --url \"https://www.youtube.com/watch?v=iQyg-KypKAA\"", "answer": "## Key Findings\n\n1. The Agentic Engineering Workflow by Kun (L8 Principal Engineer, ex-Meta/Microsoft/Atlassian) treats the engineer as a **captain** who assembles a ship (terminal), recruits crew mates (AI agents), and scales through memory files, skills, and orchestration tools — shipping 40–50 production PRs per day [1][9][2].\n2. **Memory files** (global `agents.md` and project-level `CLAUDE.md`) are supplemented by **Skills** (progressive disclosure files) that keep the system prompt lean; conditionally useful knowledge is extracted from memory into skills to save tokens [3][4][10].\n3. **Lavish** (an AXI tool) replaces walls of text with an interactive HTML editor for the planning phase, letting the captain visually review prototypes, annotate, and click decisions without leaving the browser [5][7].\n4. **No Mistakes** is a free, open-source pipeline that takes first-pass agent code through intent analysis, rebase, adversarial review in a fresh context, E2E testing with recorded evidence, documentation pass, lint checks, and PR babysitting — all in an isolated work tree [6][7][8].\n5. **Good Night Have Fun** is an open-source tool for long-running autonomous loops (e.g., overnight testing/fixing) with configurable token caps, iteration caps, and stop conditions [8][9].\n6. **Treehouse** manages git work trees so multiple parallel agent sessions can run without conflicts, auto-recycling idle work trees [9][10].\n7. **First Mate** is the final layer of orchestration: a meta-agent you talk to that spins up parallel crew mates across multiple repos, runs Treehouse for isolation, executes No Mistakes for validation, and manages context switching for you [7][8][10].\n8. **AXI** is a set of 10 design standards for agent-first tool ergonomics (e.g., token-efficient output formats save ~40% tokens vs JSON); AXI-built tools like GitHub AXI and Chrome DevTools AXI outperform MCP servers by 3x cost and 2x latency [5][10].\n9. The entire workflow is **agent-agnostic** — it works with Claude Code, Codex CLI, Goose, or Open Code — and uses **Open Super Whisper** for local voice input (3x faster than typing per Stanford research) [2][4][5].\n\n---\n\n# The Agentic Engineering Workflow — Full Setup Guide\n\n> **Source:** YouTube video by Kun (L8 Principal Engineer, ex-Meta/Microsoft/Atlassian)\n> Video: `iQyg-KypKAA`\n\n---\n\n## Finding 1: Assemble Your Ship — Terminal & Core Setup\n\nThe workflow is built on a **terminal-first architecture** to keep hands on keyboard and enable the same setup everywhere (including phone) [3][8].\n\n### Stack\n- **Terminal Emulator:** [Wezterm](https://github.com/wez/wezterm) — cross-platform (Mac/Win/Linux), Lua-configurable, hot-reloads config on save [3][8].\n- **Terminal Multiplexer:** [Tmux](https://github.com/tmux/tmux) — manages parallel sessions with a tab bar and metadata. Must be configured with keybinds and styling [3][8].\n- **Text Editor:** [Neovim](https://neovim.io/) — Vim-based, hands-on-keyboard editing, file search via `Space+f` [3][8].\n\n### Agent Harnesses (pick one — workflow is agnostic) [4][5]\n- **Claude Code** — Best default experience, rich feature set, slightly buggy [4][5].\n- **Codex CLI** — Written in Rust, smoother, open-source, less customizable [4][5].\n- **Goose** — Minimal, highly extensible [4][5].\n- **Open Code** — Buttery-smooth TUI, model-agnostic, great out-of-box feature set [4][5].\n\n### Setup commands (recreate in your terminal):\n\n```bash\n# --- Terminal & Multiplexer ---\n# Install Wezterm: https://github.com/wez/wezterm/releases\n# Install Tmux: brew install tmux (mac) / apt install tmux (linux)\n\n# --- Neovim ---\n# Install: https://github.com/neovim/neovim\n\n# --- Agent Harness (pick one) ---\n# Claude Code: https://docs.anthropic.com/en/docs/claude-code/overview\n# OR Open Code: https://github.com/sst/opencode\n# OR Codex CLI: https://github.com/openai/codex\n```\n\n---\n\n## Finding 2: Recruit & Ramp Up Crew Mates — Memory Files\n\nFresh agent instances are like new recruits — they need onboarding. This is done through **memory files** (not fancy vector DBs, just markdown) [4][10].\n\n### Global Memory File (`agents.md`)\n- Loaded into every single agent session across all projects [4][10].\n- Keep it minimal (~27 lines) to avoid silently consuming tokens on every request [4][10].\n- Stores personal preferences like \"never use &mdash;\" and \"when making technical decisions, don't give too much weight to development cost\" [4][10].\n\n### Project-Level Memory File (`CLAUDE.md` or `agents.md`)\n- Collective learning of all agent sessions on this project [3][10].\n- Contains: project context, repo layout, terminology, how important components work, E2E testing instructions, conventions [3][10].\n- **Built incrementally:** every time the agent does something wrong, correct it and ask it to \"store this learning into the memory file\" — over time crew mates get smarter [3][10].\n\n### Symbolic Link Trick (for agent-agnostic setup)\n\n```bash\n# Make both Claude Code and other agents share the same memory file\nln -s CLAUDE.md agents.md\n```\n\nThis way both `CLAUDE.md` (Claude Code) and `agents.md` (other harnesses) point to the same file [4][10].\n\n---\n\n## Finding 3: Skills — Progressive Disclosure for Token Efficiency\n\nSkills are the upgrade from bloated memory files. They use **progressive disclosure**: only the small description field loads into the system prompt at startup; the full content loads only when the agent decides to use that skill [3][10].\n\n### How to Install Skills\n\n```bash\n# Install the Skill Creator (by Anthropic) — teaches agents how to create skills\n# Uses the `npx skills` CLI from Vercel\nnpx skills <skill-name>\n```\n\nOnce installed, your agent can follow rules and create new skills for you [4][10].\n\n### Converting Memory into Skills\n\nWhen memory files grow bloated, extract conditionally-useful sections into skills:\n> \"Let's extract the end-to-end testing instructions in our agents.md file into a project level skill.\" [3][4]\n\nThis removes large chunks from the memory file and keeps the system prompt lean — the skill only loads when the agent is making changes, not when answering questions [3][10].\n\n### ⚠️ Security Warning\n\nDo **not** install random skills from the internet. Even repos with 177k GitHub stars can degrade performance (5% more tokens, worse results) and skills can instruct your agent to leak API keys or credentials [8][10].\n\n---\n\n## Finding 4: Voice Input — Open Super Whisper\n\nAll prompts are done via **voice** — Stanford research shows talking is 3x faster than typing [2][5].\n\n```bash\n# Install Open Super Whisper (free, open-source, runs locally)\n# https://github.com/nicedoc/open-super-whisper\n```\n\n- Runs the Whisper model locally on your machine [5][10].\n- Quality is excellent; only fall back to typing for URLs or file paths [5][10].\n- For custom vocabulary (project names, technical terms), set an **initial prompt** in the transcription settings menu [5][10].\n\n---\n\n## Finding 5: The Planning Phase — Lavish (Rich HTML Editor)\n\nInstead of getting a wall of text back from the agent, **Lavish** (an AXI skill) instructs the agent to create an interactive HTML artifact that uses the project's actual design system [5][7].\n\n### What Lavish provides:\n- Visual prototype of options that matches the app's look and feel [5][7]\n- Annotate and comment on specific parts of the artifact [5][7]\n- Clickable decision buttons at the bottom to choose between options [5][7]\n- Feedback is sent back to the agent directly from the Lavish editor — no need to return to terminal [5][7]\n\n> \"Honestly, I can never go back to reading text in the terminal anymore. This is just way too much more efficient.\" [7]\n\n### How to use:\nInstall the Lavish AXI skill from [axi.md](https://axi.md) catalog. The agent will auto-detect when to use it for planning [5][7].\n\n---\n\n## Finding 6: The Implementation Phase — Hands-Off Autonomy\n\nOnce planning is complete, the workflow is **fire-and-forget**:\n\n> \"Because we already clarified all the requirements in the planning phase, I typically don't need to interfere at all during this implementation phase. I only come back to this when the agent has done.\" [7]\n\nTell the agent \"start building\" and end the session. The agent works autonomously in the background [7].\n\n---\n\n## Finding 7: The No Mistakes Pipeline — Automated PR Quality Gate\n\nWhen the agent says it's done, **do not review the diff manually**. That creates a bottleneck (you can only review so many diffs per day). Instead, send the change through **No Mistakes** — a free, open-source pipeline [6][7][8].\n\n### Pipeline Steps (all in an isolated work tree) [6][7][8]:\n\n1. **Create branch & commit** — if no branch exists yet\n2. **Understand intent** — analyzes the agent session to understand the real goal\n3. **Rebase** — rebases onto latest `main` from remote origin, resolves merge conflicts upfront\n4. **Adversarial review** — runs in a fresh context window; obvious problems self-correct, ambiguous ones with product implications are escalated to human\n5. **E2E test against intent** — records evidence (screenshot, video, log file) proving the change works\n6. **Documentation pass** — updates all relevant docs to reflect the change\n7. **Lint check** — ensures no linking problems\n8. **Push branch & raise PR** — pushes to remote and creates a PR\n9. **Babysit the PR** — continues monitoring for merge conflicts and CI failures until merged\n\n### Triggering No Mistakes:\n- As a skill: just type `no mistakes` in the agent [6]\n- Automatically via First Mate [7]\n\n### Reviewing the Output:\nThe PR includes: summarized original intent, what changed, how it's tested, evidence from testing, and a **risk assessment**. For low-risk changes, skip the diff entirely — any problem is already caught by the pipeline. Only invest time on high-risk changes [6][8].\n\n---\n\n## Finding 8: Good Night Have Fun — Long-Running Autonomous Loops\n\nFor overnight or extended background work, use **Good Night Have Fun** (free, open-source). It keeps agents running in a loop until a stop condition is met [8][9].\n\n```bash\n# Run in your repo\ngood-night-have-fun \"Pretend you are a seven-year-old kid and use the app end to end. Find the first usability problem, fix it, then rinse and repeat.\"\n```\n\n### Features:\n- Monitor token usage and iteration count (shown as moon icons) [8][9]\n- Set precise token cap, iteration cap, or custom stop condition [8][9]\n- When you wake up, review a list of commits on a new branch and cherry-pick what you want [8][9]\n\n### Best for verifiable objectives:\n- Reducing page load time\n- Improving E2E test coverage\n- Running experiments to improve a metric\n- Automated usability testing [8][9]\n\n---\n\n## Finding 9: Treehouse — Git Work Tree Manager for Parallel Agents\n\nWhen running multiple agents on the same repo, they'll conflict. Git work trees are the solution, but managing them manually is overhead. **Treehouse** automates this [9][10].\n\n```bash\n# Inside your repo\ntreehouse          # Drops you into a fresh work tree\ntreehouse status   # Shows which work trees are in use vs idle\n# Close the tab when done — treehouse auto-recycles it\n```\n\nTreehouse creates isolated directories, reuses idle work trees for new sessions, and frees them when tabs are closed [9][10].\n\n### Workflow with parallel agents:\n\n```bash\n# Tab 1: Good Night Have Fun running in original repo\ntmux new -s session1\ncd my-repo\ngood-night-have-fun \"...\"\n\n# Tab 2: New feature in separate work tree\ntmux new -s session2\ncd my-repo\ntreehouse          # Creates isolated work tree\nclaude             # Launch agent here — won't conflict with Tab 1\n\n# Tab 3: Bug fix in another work tree\ntmux new -s session3\ncd my-repo\ntreehouse\nclaude             # Another isolated agent session\n```\n\n---\n\n## Finding 10: AXI — Agent-First Tool Design Standards\n\n**AXI** is a set of 10 design principles authored by Kun for building tools that treat agents as first-class citizens. It optimizes for **agent ergonomics** [5][10].\n\n### Key finding:\nUsing GitHub MCP server costs 3x more tokens and 2x more latency than using the GitHub CLI (COI). AXI-built tools perform best [5][10].\n\n### Available AXI tools:\n- **GitHub AXI** — lowest cost, highest success rate for GitHub operations [5][10]\n- **Chrome DevTools AXI** — fewer turns and less tokens vs other browser tools [5][10]\n- **Lavish AXI** — the planning/design tool [5][10]\n\n### Find AXI tools:\n```\nhttps://axi.md\n```\n\nBrowse the catalog and follow repo instructions to install [5][10].\n\n---\n\n## Finding 11: First Mate — The Orchestrator / Meta-Agent\n\nWhen managing 10+ parallel agent sessions becomes exhausting, level up to **First Mate** — a free, open-source meta-agent you talk to as the captain. It manages all crew mates for you [7][8][10].\n\n### How to use:\n\n```bash\n# Clone the First Mate repo and run an agent inside it\ngit clone https://github.com/<first-mate-repo>\ncd first-mate\nclaude   # or codex, opencode, etc.\n```\n\nThen just talk to it naturally:\n> \"I'd like to work on Lavish AXI, GitHub AXI and Chrome DevTools AXI. For all three projects, add an update command that will update their version to the latest on npm.\"\n\n### What First Mate does automatically [7][8]:\n1. Recognizes this is 3 parallel tasks, not 1\n2. Spins up tabs in Tmux behind the scenes\n3. Calls Treehouse to create isolated work trees for each\n4. Runs an agent in each work tree to do the work\n5. Runs No Mistakes to validate each change\n6. Gets PRs ready for review\n7. While waiting, accepts more work (e.g., \"look at the 3 most recent open issues\")\n8. Context-switches between tasks for you\n\n### Setting up transcription accuracy:\nIn Open Super Whisper, add an **initial prompt** with your project names and common vocabulary to improve voice recognition [5].\n\n> \"The bottleneck shifts from execution to ideas. You as the captain need to focus on talking to users, understanding the competitive landscape, and crafting a good treasure map.\" [7]\n\n---\n\n# Quick-Start Checklist\n\n```markdown\n## 1. Terminal Foundation\n- [ ] Install Wezterm (configure with Lua)\n- [ ] Install Tmux (configure keybinds and styling)\n- [ ] Install Neovim\n\n## 2. Agent Harness (pick one)\n- [ ] Claude Code\n- [ ] Codex CLI\n- [ ] Goose\n- [ ] Open Code\n\n## 3. Memory Files\n- [ ] Create global agents.md (~27 lines, personal preferences only)\n- [ ] Create project-level CLAUDE.md (repo context, conventions)\n- [ ] Run: ln -s CLAUDE.md agents.md (for agent-agnostic setup)\n\n## 4. Skills\n- [ ] Install Skill Creator: npx skills <skill-creator>\n- [ ] Extract bloated memory sections into skills\n- [ ] Do NOT install random internet skills\n\n## 5. Voice Input\n- [ ] Install Open Super Whisper\n- [ ] Add custom vocabulary to the initial prompt in transcription settings\n\n## 6. Planning\n- [ ] Install Lavish AXI from https://axi.md\n\n## 7. Quality Pipeline\n- [ ] Install No Mistakes (free, open-source)\n- [ ] Trigger via agent command \"no mistakes\" or use as default pipeline\n\n## 8. Long-Running Tasks\n- [ ] Install Good Night Have Fun\n- [ ] Use for overnight usability testing / metric optimization\n\n## 9. Parallel Sessions\n- [ ] Install Treehouse for git work tree management\n\n## 10. Orchestration\n- [ ] Clone and set up First Mate\n- [ ] Talk to it and delegate everything\n\n## 11. Tool Efficiency\n- [ ] Prefer AXI-built tools over MCP servers\n- [ ] Visit https://axi.md for the catalog\n```\n\n---\n\n> **Final mindset shift:** Spend your time at the **beginning** (planning in Lavish) and **end** (holding quality bar via risk assessments in No Mistakes PRs). Everything in the middle is AI-controlled. The more time you free in the middle, the more parallel work you can spin up [6][8].", "references": [{"label": "[1]", "source_url": "https://www.youtube.com/watch?v=iQyg-KypKAA", "timestamp_url": "https://www.youtube.com/watch?v=iQyg-KypKAA&t=0s", "start_seconds": 0.0, "end_seconds": 66.0, "chunk_index": 0, "video_id": "iQyg-KypKAA"}, {"label": "[2]", "source_url": "https://www.youtube.com/watch?v=iQyg-KypKAA", "timestamp_url": "https://www.youtube.com/watch?v=iQyg-KypKAA&t=60s", "start_seconds": 60.0, "end_seconds": 132.0, "chunk_index": 1, "video_id": "iQyg-KypKAA"}, {"label": "[3]", "source_url": "https://www.youtube.com/watch?v=iQyg-KypKAA", "timestamp_url": "https://www.youtube.com/watch?v=iQyg-KypKAA&t=989s", "start_seconds": 989.0, "end_seconds": 1071.0, "chunk_index": 2, "video_id": "iQyg-KypKAA"}, {"label": "[4]", "source_url": "https://www.youtube.com/watch?v=iQyg-KypKAA", "timestamp_url": "https://www.youtube.com/watch?v=iQyg-KypKAA&t=656s", "start_seconds": 656.0, "end_seconds": 728.0, "chunk_index": 4, "video_id": "iQyg-KypKAA"}, {"label": "[5]", "source_url": "https://www.youtube.com/watch?v=iQyg-KypKAA", "timestamp_url": "https://www.youtube.com/watch?v=iQyg-KypKAA& function escapeHtml(s){
  return String(s == null ? '' : s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
// The agent sometimes wraps its answer in a JSON payload (trailing, or inside a
// ```json fence). When present, that object's "answer" field is the canonical
// markdown answer, so prefer it and drop the surrounding prose/preamble/fences.
function extractJsonAnswer(t){
  const m = t.match(/\{\s*"(?:question|answer|references)"\s*:/);
  if(!m) return null;
  const start = m.index;
  let depth = 0, inStr = false, esc = false;
  for(let i = start; i < t.length; i++){
    const ch = t[i];
    if(inStr){
      if(esc) esc = false;
      else if(ch === '\\') esc = true;
      else if(ch === '"') inStr = false;
      continue;
    }
    if(ch === '"'){ inStr = true; continue; }
    if(ch === '{') depth++;
    else if(ch === '}'){
      depth--;
      if(depth === 0){
        try {
          const obj = JSON.parse(t.slice(start, i + 1));
          return obj && typeof obj.answer === 'string' ? obj.answer : null;
        } catch(e){ return null; }
      }
    }
  }
  return null;
}
// Strip agent noise: prefer the embedded JSON "answer", else drop a trailing
// payload, code fences, and a short meta preamble before the first heading.
function cleanAnswer(text){
  let t = String(text == null ? '' : text);
  const fromJson = extractJsonAnswer(t);
  if(fromJson != null && fromJson.trim()) return fromJson.trim();
  const jsonIdx = t.search(/\n\s*(?:```json\s*)?\{\s*"(question|answer|references)"\s*:/);
  if(jsonIdx !== -1) t = t.slice(0, jsonIdx);
  t = t.replace(/```[a-z]*\s*$/i, '').trim();
  t = t.replace(
    /^\s*[^#\n][^\n]*\n+(?=#|```)/,
    (m)=> /\b(evidence|comprehensive|here(?:'s| is)|based on|let me|i'?ll|i will|sufficient|i now have|compile|gathered)\b/i.test(m) ? '' : m
  );
  return t.replace(/```[a-z]*\s*$/i, '').trim();
}
function fmtSeconds(s){
  if(s == null) return '';
  s = Math.floor(s);
  return Math.floor(s/60)+':'+String(s%60).padStart(2,'0');
}
// Map citation number -> reference object, keyed by the digits in each label.
function buildRefMap(refs){
  const map = {};
  (refs||[]).forEach(r=>{
    const m = String(r.label||'').match(/\d+/);
    if(m) map[m[0]] = r;
  });
  return map;
}
// Inline formatting: escape, bold, and turn [n] citations into linked chips.
function inline(s, refMap){
  let out = escapeHtml(s).replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>');
  out = out.replace(/\[(\d+)\]/g, (m,n)=>{
    const ref = refMap[n];
    if(ref){
      const url = escapeHtml(ref.timestamp_url || ref.source_url || '#');
      return '<a class="cite" href="'+url+'" target="_blank" title="Open source at timestamp">'+n+'</a>';
    }
    return '<span class="cite-missing">'+n+'</span>';
  });
  return out;
}
// Paragraphs and ordered/unordered lists (headings handled by parseSections).
function renderBlocks(text, refMap){
  const lines = String(text||'').split('\n');
  let html = '', list = null, para = [];
  const flushPara = ()=>{ if(para.length){ html += '<p>'+inline(para.join(' '),refMap)+'</p>'; para = []; } };
  const closeList = ()=>{ if(list){ html += '</'+list+'>'; list = null; } };
  for(const raw of lines){
    const line = raw.replace(/\s+$/,'');
    if(!line.trim()){ flushPara(); continue; }
    let m;
    if(m = line.match(/^\s*\d+\.\s+(.*)$/)){
      flushPara(); if(list!=='ol'){ closeList(); html+='<ol>'; list='ol'; }
      html += '<li>'+inline(m[1],refMap)+'</li>'; continue;
    }
    if(m = line.match(/^\s*[-*]\s+(.*)$/)){
      flushPara(); if(list!=='ul'){ closeList(); html+='<ul>'; list='ul'; }
      html += '<li>'+inline(m[1],refMap)+'</li>'; continue;
    }
    closeList(); para.push(line.trim());
  }
  flushPara(); closeList();
  return html;
}
function parseSections(text){
  const intro = [], sections = [];
  let cur = null;
  for(const line of String(text||'').split('\n')){
    const m = line.match(/^(#{1,6})\s+(.*)$/);
    if(m){ cur = {level:m[1].length, title:m[2], body:[]}; sections.push(cur); }
    else if(cur){ cur.body.push(line); }
    else { intro.push(line); }
  }
  return {intro: intro.join('\n'), sections};
}
function renderAnswer(text, refs){
  const refMap = buildRefMap(refs);
  const {intro, sections} = parseSections(text);
  let html = renderBlocks(intro, refMap);
  for(const s of sections){
    const highlight = /key findings|summary|tl;?dr|bottom line|takeaways?/i.test(s.title);
    const tag = 'h'+Math.min(s.level+1, 5);
    html += '<section class="ans-section'+(highlight?' summary':'')+'">'
      +'<'+tag+' class="ans-h">'+inline(s.title, refMap)+'</'+tag+'>'
      +renderBlocks(s.body.join('\n'), refMap)
      +'</section>';
  }
  return html;
}
function fmtTime(iso){
  const d = new Date(iso);
  return isNaN(d) ? iso : d.toLocaleString();
}
function sortedConversations(){
  return DATA.conversations.slice().sort((a,b)=> (a.asked_at < b.asked_at ? 1 : -1));
}
function metaChips(a){
  const chips = ['~'+a.token_estimate+' tok', a.chunk_count+' chunks'];
  if(a.llm_calls != null) chips.push(a.llm_calls+' LLM calls');
  if(a.iterations != null) chips.push(a.iterations+' iterations');
  if(a.elapsed_seconds) chips.push(a.elapsed_seconds+'s');
  if(a.terminated_reason) chips.push(escapeHtml(a.terminated_reason));
  return '<div class="chips">'+chips.map(c=>'<span class="chip">'+c+'</span>').join('')+'</div>';
}
function renderRefs(refs){
  if(!refs || !refs.length) return '';
  const items = refs.map(r=>{
    const url = escapeHtml(r.timestamp_url || r.source_url || '#');
    const label = escapeHtml(r.label || '[?]');
    const at = r.start_seconds != null ? ' at '+fmtSeconds(r.start_seconds) : '';
    const vid = escapeHtml(r.video_id || '');
    return '<li><span class="rnum">'+label+'</span>'
      +'<a href="'+url+'" target="_blank">open'+escapeHtml(at)+'</a>'
      +'<span class="vid">'+vid+'</span></li>';
  }).join('');
  return '<details class="refs"><summary>Sources ('+refs.length+')</summary><ul>'+items+'</ul></details>';
}
function toggleClamp(btn){
  const body = btn.previousElementSibling;
  const expanded = body.classList.toggle('expanded');
  btn.textContent = expanded ? 'Show less ▴' : 'Show full answer ▾';
}
function answerBubble(a){
  let inner = '<div class="setup">'+escapeHtml(a.title)+'<span class="key">'+escapeHtml(a.key)+'</span></div>';
  if(a.error){
    inner += '<div class="body error">Error: '+escapeHtml(a.error)+'</div>';
  } else {
    const cleaned = cleanAnswer(a.answer);
    const long = cleaned.length > 1400;
    inner += '<div class="body'+(long?' clamp':'')+'">'+renderAnswer(cleaned, a.references)+'</div>';
    if(long) inner += '<button class="more" onclick="toggleClamp(this)">Show full answer ▾</button>';
    inner += metaChips(a);
    inner += renderRefs(a.references);
  }
  inner += '<details class="cmd"><summary>command</summary><pre>'+escapeHtml(a.command)+'</pre></details>';
  return '<div class="bubble in">'+inner+'</div>';
}
function renderSidebar(){
  const list = document.getElementById('conv-list');
  const convs = sortedConversations();
  if(!convs.length){
    list.innerHTML = '<div class="empty">No questions yet.<br>Ask one from the CLI chat.</div>';

  }
  list.innerHTML = convs.map(c=>{
    return '<div class="conv-item" data-id="'+escapeHtml(c.id)+'" onclick="selectConversation(\''+c.id+'\')">'

      +'<span>'+fmtTime(c.asked_at)+'</span><span class="conv-id">'+escapeHtml(c.id)+'</span></div>'
      +'</div>';
  }).join('');
}
function selectConversation(id){
  const conv = DATA.conversations.find(c=>c.id===id);
  if(!conv) return;
  document.querySelectorAll('.conv-item').forEach(el=>{
    el.classList.toggle('active', el.getAttribute('data-id')===id);
  });
  const head = document.getElementById('main-head');
  let sub = '<span>'+fmtTime(conv.asked_at)+'</span><span class="conv-id">'+escapeHtml(conv.id)+'</span>';
  if(conv.url) sub += '<a href="'+escapeHtml(conv.url)+'" target="_blank">restricted to one video</a>';
  head.innerHTML = '<div class="q">'+escapeHtml(conv.question)+'</div><div class="sub">'+sub+'</div>';
  const chat = document.getElementById('chat');
  let html = '<div class="bubble out"><div class="body">'+escapeHtml(conv.question)+'</div></div>';
  html += conv.answers.map(answerBubble).join('');
  chat.innerHTML = html;
  chat.scrollTop = 0;
}
function init(){
  renderSidebar();
  const convs = sortedConversations();
  if(convs.length){
    selectConversation(convs[0].id);
  } else {
    document.getElementById('chat').innerHTML =

  }
}
